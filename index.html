<body style="padding:0!important;margin:0!important;background:#000!important;">

  <div class="reels-container" id="reelsContainer"></div>

  <script>
    const allImages = [
      "https://imagecdn.live/images/webp/2f47a1dc-3f32-46a3-b3b8-c4e69bf08f42.webp",
      "https://imagecdn.live/images/webp/ef3f5d63-0405-4ab5-b25f-064bb1034e2a.webp",

      "https://imagecdn.live/images/webp/64f2f305-0ba9-4e0e-ab73-8841efe00f40.webp",

      "https://imagecdn.live/images/webp/65beac75-7f27-4af6-b9fb-989e55277180.webp",
      "https://imagecdn.live/images/webp/ba25b570-23e7-4f87-9d8f-c46420f29a7b.webp",
      "https://imagecdn.live/images/webp/bd14457d-83be-41c4-b651-766a026ccdad.webp",
      "https://imagecdn.live/images/webp/3d43a0e6-6f4b-498b-80dd-3b094e734295.webp",
      "https://imagecdn.live/images/webp/e3b9e9b0-cb29-4932-84a9-24ae9ce83f7e.webp",
      "https://imagecdn.live/images/webp/d831931a-b998-4a24-8baa-f200cbe6e9ab.webp",
      "https://imagecdn.live/images/webp/9a4ed8bd-631c-469b-a16b-266bfe5b7370.webp",
      "https://imagecdn.live/images/webp/799e843d-0391-41d2-bdd5-2f99343ab884.webp",
      "https://imagecdn.live/images/webp/ea7d6380-e579-4b48-80d0-419fe1a39ecb.webp",
      "https://imagecdn.live/images/webp/afbfdcbf-cbfe-46ab-a8fa-47a3591e29b0.webp"
    ];

    function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

    const images = shuffle(allImages.slice());

    setTimeout(function () {
      loadMoreReels();
    }, 1000);

    const links = [
      "https://da.panthawadacollege.com/top-5-hospitals-in-chennai-dapantha/"
    ];

    const usernames = ["Sophia Lane", "Emily Rose", "Ava Grace", "Mia Johnson", "Zoe Sky", "Chloe Stone"];
    const captions = ["🔥 Hot trending video!", "💃 Dance moves on fire!", "😍 Don’t scroll past this!", "⚽ Epic goal moment!", "🌄 Scenic mountain vibes!", "🎸 Guitar solo madness!"];
    const profilePics = [
      "https://randomuser.me/api/portraits/women/1.jpg",
      "https://randomuser.me/api/portraits/women/2.jpg",
      "https://randomuser.me/api/portraits/women/3.jpg",
      "https://randomuser.me/api/portraits/women/4.jpg",
      "https://randomuser.me/api/portraits/women/5.jpg",
      "https://randomuser.me/api/portraits/women/6.jpg"
    ];

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function formatCount(n) { return n > 999 ? (n / 1000).toFixed(1) + 'K' : n; }

    const reels = document.getElementById("reelsContainer");
    let loadedCount = 0;

    function createReel(img, index) {
      const like = formatCount(rand(1000, 95000));
      const comment = formatCount(rand(80, 4500));
      const share = formatCount(rand(10, 2000));
      const profile = profilePics[index % profilePics.length];
      const username = usernames[index % usernames.length];
      const caption = captions[index % captions.length];
      const link = links[index % links.length];

      const reel = document.createElement("div");
      reel.className = "reel";
      reel.onclick = () => window.location.href = link;

      reel.innerHTML = `
    <img src="${img}" alt="" loading="lazy">
    <div class="play-button">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
    <div class="right-icons">
      <div class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
          <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
        </svg>
        <span>${like}</span>
      </div>
      <div class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>${comment}</span>
      </div>
      <div class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
          <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
        </svg>
        <span>${share}</span>
      </div>
    </div>
    <div class="profile-section">
      <div class="profile-ring"><img src="${profile}" alt="" loading="lazy"></div>
      <div class="username">
        ${username}
        <div class="verify-box">
          <svg width="7" height="7" viewBox="0 0 24 24" fill="white">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
      </div>
      <button class="follow-btn">Follow</button>
    </div>
    <div class="caption">${caption}</div>
  `;
      reels.appendChild(reel);
      loadedCount++;
    }

    for (let i = 0; i < Math.min(3, images.length); i++) {
      createReel(images[i], i);
    }

    function loadMoreReels() {
      const total = images.length;
      for (let i = loadedCount; i < total; i++) {
        createReel(images[i], i);
      }
    }
  </script>
